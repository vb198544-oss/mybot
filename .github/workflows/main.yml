name: SOL Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python qurulum
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Kitabxanalar
        run: pip install pybit pandas requests
      - name: Botu işə sal
        run: timeout 840 python bot.py || true
